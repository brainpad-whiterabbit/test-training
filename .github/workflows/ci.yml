name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Run checks
        run: ./scripts/check.sh

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Run tests
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run pytest -ra --tb=short --cov=src --cov-report=term-missing --cov-report=xml:test-results/coverage.xml | tee test-results/pytest-report.txt

      - name: Report coverage
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: 5monkeys/cobertura-action@v14
        with:
          path: test-results/coverage.xml
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          show_line: true
          show_branch: true
          show_missing: true
          minimum_coverage: 0

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: |
            test-results/pytest-report.txt
            test-results/coverage.xml

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Audit dependencies
        id: audit
        shell: bash
        continue-on-error: true
        run: |
          mkdir -p security-results
          uv run pip-audit --local --format markdown --output security-results/pip-audit.md

      - name: Publish audit summary
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.audit.outcome }}" == "success" ]]; then
            status="Passed"
            result="No known vulnerabilities were detected."
          else
            status="Failed"
            result="Known vulnerabilities were detected."
          fi

          {
            echo "## Dependency security audit"
            echo
            echo "| Item | Result |"
            echo "| --- | --- |"
            echo "| Status | ${status} |"
            echo "| Tool | pip-audit |"
            echo "| Target | Installed locked dependency set |"
            echo
            echo "${result}"
            echo
            echo "<details>"
            echo "<summary>Audit details</summary>"
            echo
            if [[ -s security-results/pip-audit.md ]]; then
              cat security-results/pip-audit.md
            else
              echo "No vulnerable packages were reported."
            fi
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment audit result on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- dependency-security-audit -->';
            const reportPath = 'security-results/pip-audit.md';
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8').trim()
              : '';
            const passed = '${{ steps.audit.outcome }}' === 'success';
            const status = passed ? 'Passed' : 'Failed';
            const result = passed
              ? 'No known vulnerabilities were detected.'
              : 'Known vulnerabilities were detected.';
            const details = report || 'No vulnerable packages were reported.';
            const body = [
              marker,
              '## Dependency security audit',
              '',
              '| Item | Result |',
              '| --- | --- |',
              `| Status | ${status} |`,
              '| Tool | pip-audit |',
              '| Target | Installed locked dependency set |',
              '',
              result,
              '',
              '<details>',
              '<summary>Audit details</summary>',
              '',
              details,
              '',
              '</details>',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-audit
          path: security-results/pip-audit.md

      - name: Fail on known vulnerabilities
        if: steps.audit.outcome == 'failure'
        run: exit 1

  build-pages:
    runs-on: ubuntu-latest
    needs:
      - check
      - test
      - security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build documentation
        run: uv run zensical build

      - name: Generate coverage badge
        shell: bash
        run: |
          mkdir -p site/badges test-results
          uv run pytest --cov=src --cov-report=xml:test-results/coverage.xml
          uv run python - <<'PY'
          import html
          import xml.etree.ElementTree as ET
          from pathlib import Path

          line_rate = float(ET.parse("test-results/coverage.xml").getroot().attrib["line-rate"])
          coverage = round(line_rate * 100)
          colors = [
              (90, "#4c1"),
              (75, "#97ca00"),
              (60, "#dfb317"),
              (40, "#fe7d37"),
              (0, "#e05d44"),
          ]
          color = next(hex_color for threshold, hex_color in colors if coverage >= threshold)
          label = "coverage"
          value = f"{coverage}%"
          label_width = 68
          value_width = max(46, 10 + len(value) * 7)
          width = label_width + value_width
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="20" role="img" aria-label="{html.escape(label)}: {html.escape(value)}">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="{width}" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="{label_width}" height="20" fill="#555"/>
              <rect x="{label_width}" width="{value_width}" height="20" fill="{color}"/>
              <rect width="{width}" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
              <text x="{label_width / 2}" y="15" fill="#010101" fill-opacity=".3">{html.escape(label)}</text>
              <text x="{label_width / 2}" y="14">{html.escape(label)}</text>
              <text x="{label_width + value_width / 2}" y="15" fill="#010101" fill-opacity=".3">{html.escape(value)}</text>
              <text x="{label_width + value_width / 2}" y="14">{html.escape(value)}</text>
            </g>
          </svg>
          '''
          Path("site/badges/coverage.svg").write_text(svg, encoding="utf-8")
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
