name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Run checks
        run: ./scripts/check.sh

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Run tests
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run pytest -ra --tb=short --cov=src --cov-report=term-missing --cov-report=xml:test-results/coverage.xml | tee test-results/pytest-report.txt

      - name: Report coverage
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: 5monkeys/cobertura-action@v14
        with:
          path: test-results/coverage.xml
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          show_line: true
          show_branch: true
          show_missing: true
          minimum_coverage: 0

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: |
            test-results/pytest-report.txt
            test-results/coverage.xml

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Audit dependencies
        id: audit
        shell: bash
        continue-on-error: true
        run: |
          mkdir -p security-results
          uv run pip-audit --local --format markdown --output security-results/pip-audit.md

      - name: Publish audit summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Dependency security audit"
            echo
            if [[ "${{ steps.audit.outcome }}" == "success" ]]; then
              echo "No known vulnerabilities were detected."
            else
              echo "Known vulnerabilities were detected."
            fi
            echo
            if [[ -s security-results/pip-audit.md ]]; then
              cat security-results/pip-audit.md
            else
              echo "No audit report was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment audit result on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- dependency-security-audit -->';
            const reportPath = 'security-results/pip-audit.md';
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8').trim()
              : 'No audit report was generated.';
            const status = '${{ steps.audit.outcome }}' === 'success'
              ? 'No known vulnerabilities were detected.'
              : 'Known vulnerabilities were detected.';
            const body = `${marker}
            ## Dependency security audit

            ${status}

            ${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-audit
          path: security-results/pip-audit.md

      - name: Fail on known vulnerabilities
        if: steps.audit.outcome == 'failure'
        run: exit 1

  build-pages:
    runs-on: ubuntu-latest
    needs:
      - check
      - test
      - security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build documentation
        run: uv run zensical build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
