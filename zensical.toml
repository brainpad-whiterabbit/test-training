[project]
site_name = "シフトレフト開発演習"
site_description = "電卓Webアプリを題材にしたシフトレフト開発演習"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/extra.css"]

[project.theme]
language = "ja"
font.text = "Noto Sans JP"
font.code = "JetBrains Mono"
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.path",
  "navigation.tracking",
  "navigation.footer",
  "navigation.indexes",
  "navigation.top",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "ダークモードに切り替え"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "ライトモードに切り替え"
