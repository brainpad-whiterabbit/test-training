[project]
site_name = "シフトレフト開発演習"
site_description = "電卓Webアプリを題材にしたシフトレフト開発演習"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/extra.css"]
nav = [
  { "はじめに" = "index.md" },
  { "演習の進め方" = "guide.md" },
  { "チュートリアルスプリント" = "sprints/sprint-0.md" },
  { "演習スプリント1" = "sprints/sprint-1.md" },
  { "演習スプリント2" = "sprints/sprint-2.md" },
  { "演習スプリント3" = "sprints/sprint-3.md" },
  { "付録" = [
    { "要件レビュー観点表" = "appendix/requirements-review-template.md" },
    { "テスト分析テンプレート" = "appendix/test-analysis-template.md" },
    { "設計レビュー観点表" = "appendix/design-review-template.md" },
    { "テスト設計テンプレート" = "appendix/test-design-template.md" },
    { "ユーザビリティテスト台本" = "appendix/usability-test-script.md" },
    { "評価基準" = "appendix/evaluation-rubric.md" },
  ] },
]

[project.theme]
language = "ja"
font.text = "Noto Sans JP"
font.code = "JetBrains Mono"
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.path",
  "navigation.tracking",
  "navigation.footer",
  "navigation.top",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "ダークモードに切り替え"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "ライトモードに切り替え"
