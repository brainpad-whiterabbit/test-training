[project.theme]
language = "ja"
font.text = "Noto Sans JP"
font.code = "JetBrains Mono"
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.path",
  "navigation.tracking",
  "navigation.top",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "ダークモードに切り替え"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "ライトモードに切り替え"
